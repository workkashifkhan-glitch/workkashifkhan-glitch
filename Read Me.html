<!DOCTYPE html>
<html>
<head>
    <title>HTML Assignment</title>
</head>
<body>

    <!-- Header -->
    <table width="100%" border="6">
        <tr>
            <td align="center">
                <h1>My Website Header</h1>
            </td>
        </tr>
    </table>

    <br>

    <!-- Navigation -->
    <table width="100%" >
        <tr>
            <td align="center">
                Home | About | Services | Contact
            </td>
        </tr>
    </table>

    <br>

    <!-- Main Content Area -->
    <table width="100%" border="2">
        <tr>
            <td width="25%" align="center">
                <h3>Left Content</h3>
                <p>This is left side content.</p>
            </td>

            <td width="50%" align="center">
                <h2>Main Content</h2>
                <p>This is the main content in the center.</p>
            </td>

            <td width="25%" align="center">
                <h3>Right Content</h3>
                <p>This is right side content.</p>        
            </td>
        </tr>
    </table>

    <br>

    <!-- Footer -->
    <table width="100%" border="3">
        <tr>
            <td align="center">
                <p>Website Footer</p>
            </td>
        </tr>
    </table>

</body>
</html>
